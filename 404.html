    var postsCount =  6 ;
    var arrPosts = [{"link":"https://arcticpiratel.github.io/posts/ads_%E5%B7%A6%E5%BC%8F%E5%A0%86/","plain":"左式堆 目标： 减少合并堆的时间复杂度到O(N)。\n堆：结构特性（完全二叉树）+排列特性（最小堆）\n其他堆存在的问题：若用数组存储，时间复杂度为θ(N)，不是上界；若用指针存储，找到下一条指针的过程所有操作时间都将增加。\n概述 order property：与二叉堆相同，最小值在上。\nstructure property：不平衡二叉树。\n定义 null path length： Npl(X)，表示任何节点X到没有两个儿子的节点的最短路径长度。定义Npl(NULL)=-1。（叶子节点的Npl为0）\nNpl计算：从底层向顶层扩展。公式如下：\n==Npl(X) = min { Npl(C) + 1 for all C as children of X }==\nstructure property 对于每个节点X，其左儿子的Npl大于等于右儿子的Npl。更倾向于向左延伸。\n定理 若右路径包含r个节点，则左式堆至少包含\\(2^r\\)个节点。 若左式堆包含N个节点，则右路径最多包含\\(log(N+1)\\)个节点。 因此，若能够实现所有操作均在右路径上进行，则可以限制操作的时间复杂度。\n困难情况：插入和合并。又因为插入属于合并的特殊情况，因此只需解决合并问题即可。\n实现原理 节点数据结构 element、left pointer、right pointer、Npl\n实例（递归求解） 首先比较根节点大小，较小的一方不变。即将H2与H1的右子堆合并。Merge(H1-\u0026gt;right, H2)\n将得到的新堆赋值给原H1的右子堆。Attach(H2, H1-\u0026gt;right)\n如果不符合左式堆条件，交换左右子堆。Swap(H1-\u0026gt;left, H1-\u0026gt;right)\n代码实现 时间复杂度：\\(T_p=O(logN)\\) 实例（迭代求解） 选择根节点较小的堆，左子堆不变。 两个堆的右路径按大小排序，依次插入到上一步选择出的堆的右子堆上。（每个节点与其左子堆绑定）（此时并不符合左式堆） 对于右路径，从底层到顶层，检查Npl，如果不符合左式堆则调换左右子堆。 对于递归和迭代，所有操作时间复杂度均为log N。\n删除最小操作 删除根节点 合并左右子堆 时间复杂度为\\(T=O(logN)\\) ","pubDate":"2023-05-20","title":"ADS_左式堆"},{"link":"https://arcticpiratel.github.io/posts/ads_%E7%BA%A2%E9%BB%91%E6%A0%91/","plain":"红黑树 概述 AVL树是首个自平衡树，定义了“平衡”的衡量标准（BF）。\nSplay树是AVL树的简化版，无需考虑平衡，表现与AVL树相同。\n现实应用中存在其他定义“平衡”的方法：如红黑树、B+树，红黑树应用于C++STL中的map等类型。\n目标 平衡二叉搜索树。\n节点结构如下：\nNULL节点也称为NIL。\n定义 五个特性 每个节点是红色或黑色中的一个。 根节点为黑色。 每个NULL叶子节点为黑色。 红色节点的两个儿子一定为黑色。 对于每个节点，其到叶子节点的所有简单路径上黑色节点的个数相同。 black_height：从x到叶子节点的黑色节点的个数，不包括root包括NULL。bh(Tree) = bh(root)\ninternal_nodes：除NIL节点外的结点。\nexternal_nodes：NIL节点。\n定理 拥有N个internal_nodes的红黑树，其高度最大为2ln(N+1)。\n即使没有AVL更为严格的平衡定义，红黑树也将其高度限制在了O(lgN)的水平。\n- 对于任何节点x，以x为根的所有子树的internal_nodes个数**大于等于**\\(2^{bh}-1\\)。通过数学归纳法证明。 将x替换为root，则sizeof(x) = N，得到\\(N\u0026gt;=2^{bh}-1\\)。 bh(Tree) \u0026gt;= h(Tree)/2。\n证明：每条路径上，除根节点外，至少有一半的节点时黑色。\n\\(N \u0026gt;= 2^{bh}-1 \u0026gt;= 2^{h/2}-1\\)，证明结束。 插入操作 需要尽可能避免改变红黑树的bh，避免重新平衡。因此新插入的节点颜色应为红色。但再次插入红节点时需要重新平衡，引出三种情况：\nCase 1 新节点为红色，父节点为红色，父节点的兄弟节点也为红色。\n解决方式：父代所有节点和祖父节点红黑颜色调换。\nCase 2 新节点为红色且是父节点的右儿子，父节点为红色，父节点的兄弟节点为黑色。\n解决方式：将新节点和其父节点进行一次旋转。\nCase 3 新节点为红色且是父亲的左儿子，父节点为红色，父节点的兄弟节点为黑色。\n解决方式：首先将父节点和祖父节点互换颜色，再将父节点作为新的根节点进行旋转。\nAVL树 \u0026amp; 红黑树 step 1：向二叉搜索树中插入节点。 step 2：从底层到顶层，检查BF/颜色是否符合规定。 最坏情况相同，都需要进行两次rotation。\n时间复杂度 $$T=O(h)=O(logN)$$ 删除操作 需要从底层向顶层平衡，AVL树的最坏情况是从叶子节点开始，直到整棵树平衡，消耗O(log N)；\n而红黑树的优势在于，最坏情况只需要3次旋转即可。\n二叉树的删除\n红黑树的删除\n对于degree 2 node，替换节点的同时保留原节点的颜色，不需要重新平衡。\n对于degree 1 node，同样不需要重新平衡。\n对于叶子节点，需要重新平衡，会出现一条路径黑色节点少一个的情况。因此需要向这条路径中加入一个黑色节点。\nCase 1 删除的节点为黑色，兄弟结点为红色，父节点为黑色。\n解决方法：先将兄弟节点与父节点颜色调换，再旋转兄弟节点，最后把新成为父节点的节点加上一个黑节点。（仍未解决）\nCase 2 \u0026amp; Case 3 \u0026amp; Case 4 删除的节点为黑色，其兄弟节点均为黑色。\nCase 2：兄弟节点的两个儿子均为黑色。\n解决方法：首先将兄弟节点变为红色，面临两种情况。\n①如果父节点为红色，将父节点变为黑色。\n②如果父节点为黑色，更新x指向父节点，继续向x所在路径添加黑节点。这是最坏的情况，需要向上继续执行操作直到遇到case3或case4的情况或x最终为根节点，但不需要旋转，只进行了改变颜色的操作。\n**Case 3：**兄弟节点的左儿子为红色，右儿子为黑色。\n解决方法：首先调换兄弟节点及其左儿子的颜色，再进行一次旋转。更新w指向旋转后的兄弟节点，可跳转到case4。\n**Case 4：**兄弟节点的右儿子是红色，左儿子任意。\n解决方法：w节点的父亲和右儿子都变成黑色，w节点本身与原父亲节点的颜色相同，再进行一次旋转，最终解决问题。\n共有3次旋转。\n举例 旋转次数分析 operation AVL树 红黑树 插入 \u0026lt;=2 \u0026lt;=2 删除 O(log N) \u0026lt;=3 当主要操作为查找时，AVL更快，由于其高度较低；\n当存在大量插入或删除操作时，红黑树更好。\n","pubDate":"2023-05-20","title":"ADS_红黑树"},{"link":"https://arcticpiratel.github.io/posts/ads_b+%E6%A0%91/","plain":"B+树 概述 常用于数据库、文件系统。大量数据通常存储在磁盘中而非主存，然而磁盘中查找文件速度较慢，为提升速度需要将存储空间划分为很多个block。\nB树是搜索树的一种，与二叉搜索树不同。B树包括原始B树、B+树、B-树等。\n定义 order为M的树。结构特性如下：\n根节点是叶子节点或有2到M个孩子。 除根节点外所有的非叶子节点有**[M/2, M]**个孩子。 所有叶子节点深度相同。 从底层向上层构建，平衡性非常好。\n所有真实数据都存放在叶子节点中。\n每个中间节点包括M个儿子指针和M-1个key，key存放除第一个子节点外的每个子节点中最小的元素值。\n所有叶子节点为从小到大的顺序。\n查找操作 与二叉搜索树类似，从根节点开始，比较节点的key值和要查找的值。\n插入操作 首先查找到将要插入的叶子节点位置。\n若满足B+树的节点数要求，直接插入即可。\n若不满足，则分裂成两个叶子节点，并更新父节点的key值。\n若导致父节点也不满足节点数要求，则继续向上分裂。\n存在问题：不断低效插入导致高度增加较快。此时可以优先考虑未满的叶子节点进行插入，使尽可能多的叶子节点达到full状态。\n代码实现 $$T(M,N)=O((\\frac{M}{logM})logN)$$ $$T_{Find}(M,N)=O(logN)$$ $$Depth(M,N)=O(log_\\frac{M}{2}N)$$ 根据时间复杂度公式，并不是M越大越高效。实际结果表明，M=3或4时表现最佳。\n","pubDate":"2023-05-19","title":"ADS_B+树"},{"link":"https://arcticpiratel.github.io/posts/ads_splay%E6%A0%91/","plain":"Splay Tree 目标 从空树开始的任何M个连续操作的最大时间开销为O(Mlog N)。（不表示所有操作均为O(log N)，实际上是amortized time为O(logN)）\nAVL树属于Splay树。因为AVL对于所有操作的时间复杂度均为O(log N)。\namortized time：摊还时间\n核心思想 最坏情况为O(N)，但总时间保持不变。为避免连续多次最坏情况，出现过一次最坏情况的点，下次访问时一定需要到达最好情况。\nSplay树定义了这种移动方法：每次访问一个节点后，将其使用AVL树的规则翻转至根节点。\n不考虑平衡情况。\n查找方法 使用single-rotation 存在的问题：其他节点被换到更低的位置\n最坏情况：依次插入1……N，最终的树形式仍然非常不平衡。循环查找1……N，时间复杂度会非常坏。\n使用double-rotation 不仅考虑父子节点（X、P），同时加上祖父节点（G）。\n三种情况：\nP是根节点：X和P进行single-rotation\nP不是根节点：\nzig-zag：\nzig-zig：\n使用double-rotation的方式可以大致将最底层的深度减半，是更好的选择。\n删除方法 四个步骤：\n首先查找X：此时X为根。\n删除X：得到左右两个子树。\n找到左子树中的最大值：这个最大值成为左子树的根，且没有右子树。\n将原右子树连接到左子树上。\nSplay树 \u0026amp; AVL树 Splay树实现更简单（不需要时刻考虑BF）\n","pubDate":"2023-05-19","title":"ADS_Splay树"},{"link":"https://arcticpiratel.github.io/posts/ads_%E7%BB%AA%E8%AE%BA/","plain":"ADS绪论 高级数据结构与算法分析主要包括三块问题：\n动态查找问题 **总体目的：**查找树且完全二叉树（降低高度）。\n难度过大，因此数据结构核心目标：有一定自由度。因此需要考虑如何进行树的平衡。\n高级堆（优先队列问题） **总体目的：**插入任意\u0026amp;删除最小/最大。\n**结构特性：**完全二叉树（structure property）\n**排序特性：**结点上满足堆的条件（所在子树最大/最小）（order property）。\n**新问题：**云计算，每个云端服务器管理一个堆，本质上为资源整合。（弹性计算）\n​ 云计算的调度问题，把正在计算的任务迁移到其他机器，使其最高效运转，即两个优先队列的合并问题。\n算法思想 包括分治算法、动态规划、贪婪算法、NPC问题……\n大致归为两类：\n经典算法：如贪婪算法、分治算法…… 非经典算法：寻找次优解，如加速、并行…… ","pubDate":"2023-05-19","title":"ADS_绪论"},{"link":"https://arcticpiratel.github.io/posts/%E6%B5%8B%E8%AF%95%E6%A0%B7%E4%BE%8B/","plain":"明月几时有 把酒问青天 不知天上宫阙 今夕是何年。\n","pubDate":"2023-05-19","title":"测试样例"}];
